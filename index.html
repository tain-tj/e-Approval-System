<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Document Approval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background-color: #ffffff; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .hidden-section { display: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; padding: 10px 0; z-index: 50;}
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.75rem; cursor: pointer; transition: color 0.3s; width: 25%;}
        .nav-item.active { color: #3b82f6; }
    </style>
</head>
<body onload="initApp()">

<div class="app-container">
    <div id="authSection" class="p-8 flex flex-col justify-center min-h-screen bg-blue-50">
        <div class="text-center mb-8"><i class="fas fa-file-signature text-6xl text-blue-500 mb-4"></i><h1 class="text-2xl font-semibold" id="authTitle">เข้าสู่ระบบ</h1></div>
        
        <div id="loginForm" class="bg-white p-6 rounded-2xl shadow-sm border">
            <input type="text" id="log_username" placeholder="Username" class="w-full mb-4 p-3 border rounded-xl text-sm">
            
            <div class="relative mb-4">
                <input type="password" id="log_password" placeholder="Password" class="w-full p-3 border rounded-xl text-sm pr-10">
                <button type="button" onclick="togglePassView('log_password')" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600"><i class="fas fa-eye"></i></button>
            </div>

            <div class="flex items-center mb-6 text-sm text-gray-600">
                <input type="checkbox" id="chk_remember" class="mr-2 rounded">
                <label for="chk_remember">จดจำข้อมูลเข้าระบบ</label>
            </div>

            <button onclick="handleLogin()" class="w-full bg-blue-500 text-white p-3 rounded-xl font-medium">เข้าสู่ระบบ</button>
            <p class="text-center text-sm text-gray-500 mt-4 cursor-pointer" onclick="toggleAuth('register')">ลงทะเบียนใหม่</p>
        </div>

        <div id="registerForm" class="hidden-section bg-white p-6 rounded-2xl shadow-sm border">
            <input type="text" id="reg_username" placeholder="Username" class="w-full mb-3 p-3 border rounded-xl text-sm">
            <div class="relative mb-3">
                <input type="password" id="reg_password" placeholder="Password" class="w-full p-3 border rounded-xl text-sm pr-10">
                <button type="button" onclick="togglePassView('reg_password')" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600"><i class="fas fa-eye"></i></button>
            </div>
            <input type="text" id="reg_name" placeholder="ชื่อ-นามสกุล" class="w-full mb-3 p-3 border rounded-xl text-sm">
            <select id="reg_dept" class="w-full mb-3 p-3 border rounded-xl bg-white text-sm"><option value="">กำลังโหลดแผนก...</option></select>
            <input type="email" id="reg_email" placeholder="Email" class="w-full mb-4 p-3 border rounded-xl text-sm">
            <button onclick="handleRegister()" class="w-full bg-green-500 text-white p-3 rounded-xl font-medium">สมัครใช้งาน</button>
            <p class="text-center text-sm text-gray-500 mt-4 cursor-pointer" onclick="toggleAuth('login')">ย้อนกลับ</p>
        </div>
    </div>

    <div id="mainAppSection" class="hidden-section pb-24">
        <div class="bg-blue-600 text-white p-5 rounded-b-3xl shadow-md mb-6 flex justify-between items-center">
            <div><h2 class="text-lg font-semibold"><span id="displayUserName"></span></h2><p class="text-xs text-blue-200" id="displayUserRole"></p></div>
            <button onclick="logout()"><i class="fas fa-sign-out-alt text-xl"></i></button>
        </div>

        <div id="tab-dashboard" class="p-4 tab-content">
            <h3 class="text-xl font-semibold mb-4">สถิติระบบภาพรวม</h3>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-blue-50 p-4 rounded-xl text-center"><p class="text-sm text-blue-600">เอกสารทั้งหมด</p><h2 class="text-3xl font-bold" id="stat-total">-</h2></div>
                <div class="bg-green-50 p-4 rounded-xl text-center"><p class="text-sm text-green-600">อนุมัติแล้ว</p><h2 class="text-3xl font-bold" id="stat-approved">-</h2></div>
            </div>
            <div class="bg-yellow-50 p-4 rounded-xl text-center border mb-6"><p class="text-sm text-yellow-600">กำลังดำเนินการ</p><h2 class="text-3xl font-bold" id="stat-pending">-</h2></div>

            <div class="bg-gray-50 p-4 rounded-2xl border mb-4">
                <h4 class="font-semibold text-sm mb-3 text-gray-700"><i class="fas fa-filter mr-1"></i> ค้นหาเอกสารระบบ</h4>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="text" id="f_docId" placeholder="รหัสเอกสาร" class="p-2 border rounded text-xs">
                    <input type="text" id="f_title" placeholder="ชื่อเรื่อง" class="p-2 border rounded text-xs">
                </div>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <select id="f_type" class="p-2 border rounded text-xs bg-white"><option value="">ทุกประเภท</option><option>WI</option><option>FI</option></select>
                    <select id="f_dept" class="p-2 border rounded text-xs bg-white"><option value="">ทุกแผนก</option></select>
                    <input type="number" id="f_year" placeholder="ปี (ค.ศ.)" class="p-2 border rounded text-xs">
                </div>
                <button onclick="searchDocs()" class="w-full bg-blue-600 text-white py-2 rounded-xl text-xs font-semibold"><i class="fas fa-search mr-1"></i> ค้นหา</button>
            </div>
        </div>

        <div id="tab-request" class="hidden-section p-4 tab-content">
            <h3 class="text-xl font-semibold mb-4">สร้างคำขอ</h3>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <input type="text" id="docId" placeholder="หมายเลขเอกสาร" class="w-full mb-3 p-2 border rounded text-sm">
                <input type="text" id="title" placeholder="เรื่อง" class="w-full mb-3 p-2 border rounded text-sm">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <select id="docType" class="w-full p-2 border rounded text-sm"><option>WI</option><option>FI</option></select>
                    <select id="docStatus" class="w-full p-2 border rounded text-sm"><option>เอกสารบังคับใช้</option><option>เอกสารทั่วไป</option></select>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="number" id="revNo" placeholder="ฉบับที่" class="w-full p-2 border rounded text-sm">
                    <select id="secretLevel" class="w-full p-2 border rounded text-sm"><option>เอกสารภายใน</option><option>ลับ</option></select>
                </div>
                <input type="file" id="fileUpload" accept=".pdf" class="w-full mb-4 p-2 border rounded text-sm">
                <button onclick="submitRequest()" class="w-full bg-blue-500 text-white p-3 rounded-xl font-medium">ส่งขออนุมัติ</button>
            </div>
        </div>

        <div id="tab-tracking" class="hidden-section p-4 tab-content">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-xl font-semibold">ติดตาม & อนุมัติเอกสาร</h3>
                <button onclick="loadDocuments()" class="text-blue-500 text-sm"><i class="fas fa-sync"></i> รีเฟรช</button>
            </div>
            <div id="batchDocContainer" class="flex gap-2 mb-3 hidden-section">
                <button onclick="selectAllDocs()" class="bg-gray-200 text-gray-700 px-3 py-1 rounded text-xs">เลือกทั้งหมด</button>
                <button onclick="actionBatchDoc('approve')" class="bg-green-500 text-white px-3 py-1 rounded text-xs flex-1">อนุมัติที่เลือก</button>
                <button onclick="actionBatchDoc('reject')" class="bg-red-500 text-white px-3 py-1 rounded text-xs flex-1">ตีกลับ</button>
            </div>
            <div id="documentListContainer"></div>
            <div class="flex justify-between items-center mt-4">
                <button onclick="changePage(-1)" id="btnPrev" class="bg-gray-200 px-3 py-1 rounded text-xs disabled:opacity-50">ก่อนหน้า</button>
                <span id="pageInfo" class="text-xs text-gray-500">หน้า 1/1</span>
                <button onclick="changePage(1)" id="btnNext" class="bg-gray-200 px-3 py-1 rounded text-xs disabled:opacity-50">ถัดไป</button>
            </div>
        </div>

        <div id="tab-users" class="hidden-section p-4 tab-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold text-purple-600">จัดการผู้ใช้ทั้งหมด</h3>
                <button onclick="loadAllUsersAdmin()" class="text-blue-500 text-sm"><i class="fas fa-sync"></i> รีเฟรช</button>
            </div>
            <div id="userListContainer"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('dashboard', this)"><i class="fas fa-chart-pie"></i><span>ภาพรวม</span></div>
            <div class="nav-item" onclick="switchTab('request', this)"><i class="fas fa-file-medical"></i><span>สร้าง</span></div>
            <div class="nav-item" onclick="switchTab('tracking', this)"><i class="fas fa-tasks"></i><span>ติดตาม</span></div>
            <div class="nav-item" id="navUsers" style="display:none;" onclick="switchTab('users', this)"><i class="fas fa-users-cog text-purple-500"></i><span class="text-purple-500">จัดการผู้ใช้</span></div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxSOGutKx0qinHxLzWa5cM1V_UI_vhsDwu9_ZLcrE6oceEgc5q9AGv3V1uPD1szoh-P/exec"; 
    let currentUser = null; let allDocsData = []; let currentPage = 1; const pageSize = 30;
    const showLoading = (msg) => Swal.fire({ title: msg, allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    function initApp() {
        // ดึงจำรหัสผ่านที่เซฟไว้ขึ้นมา
        if(localStorage.getItem("rem_user")) {
            document.getElementById("log_username").value = localStorage.getItem("rem_user");
            document.getElementById("log_password").value = localStorage.getItem("rem_pass");
            document.getElementById("chk_remember").checked = true;
        }

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDepartments' }) }).then(res => res.json()).then(res => {
            if(res.success && res.data.length > 0) {
                let opts = '<option value="">-- เลือกแผนก --</option>'; let filterOpts = '<option value="">ทุกแผนก</option>';
                res.data.forEach(d => { opts += `<option value="${d}">${d}</option>`; filterOpts += `<option value="${d}">${d}</option>`; });
                document.getElementById('reg_dept').innerHTML = opts;
                document.getElementById('f_dept').innerHTML = filterOpts;
            }
        });
    }

    function togglePassView(id) {
        let el = document.getElementById(id);
        el.type = el.type === "password" ? "text" : "password";
    }

    function toggleAuth(type) {
        document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
        document.getElementById('authTitle').innerText = type === 'login' ? 'เข้าสู่ระบบ' : 'ลงทะเบียน';
    }

    async function handleLogin() {
        const u = document.getElementById('log_username').value; const p = document.getElementById('log_password').value;
        if(!u || !p) return Swal.fire('เตือน', 'กรุณากรอกให้ครบ', 'warning');
        
        // บันทึกการจดจำรหัสผ่าน
        if(document.getElementById("chk_remember").checked) {
            localStorage.setItem("rem_user", u); localStorage.setItem("rem_pass", p);
        } else {
            localStorage.removeItem("rem_user"); localStorage.removeItem("rem_pass");
        }

        showLoading('กำลังเข้าระบบ...');
        try {
            const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: u, password: p }) })).json();
            if (res.success) {
                currentUser = res.user; Swal.close();
                document.getElementById('authSection').style.display = 'none'; document.getElementById('mainAppSection').style.display = 'block';
                document.getElementById('displayUserName').innerText = currentUser.name; document.getElementById('displayUserRole').innerText = currentUser.role;
                if(currentUser.role === 'Admin') { document.getElementById('navUsers').style.display = 'flex'; loadAllUsersAdmin(); }
                loadDashboard(); loadDocuments();
            } else Swal.fire('ล้มเหลว', res.message, 'error');
        } catch (err) { Swal.fire('Error', 'เชื่อมต่อไม่ได้', 'error'); }
    }

    async function handleRegister() {
        const data = { action: 'register', username: document.getElementById('reg_username').value, password: document.getElementById('reg_password').value, name: document.getElementById('reg_name').value, dept: document.getElementById('reg_dept').value, email: document.getElementById('reg_email').value };
        if(!data.username || !data.password || !data.dept) return Swal.fire('เตือน', 'กรอกข้อมูลให้ครบ', 'warning');
        showLoading('กำลังลงทะเบียน...');
        const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) })).json();
        if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); toggleAuth('login'); } else Swal.fire('ล้มเหลว', res.message, 'error');
    }

    async function submitRequest() {
        const fileInput = document.getElementById('fileUpload');
        if(fileInput.files.length === 0) return Swal.fire('เตือน', 'แนบไฟล์ด้วยครับ', 'warning');
        showLoading('กำลังบันทึกและอัปโหลดไฟล์...');
        const reader = new FileReader();
        reader.onload = async function() {
            const payload = { action: 'submitDoc', username: currentUser.username, name: currentUser.name, dept: currentUser.dept, docId: document.getElementById('docId').value, title: document.getElementById('title').value, docType: document.getElementById('docType').value, docStatus: document.getElementById('docStatus').value, revNo: document.getElementById('revNo').value, secretLevel: document.getElementById('secretLevel').value, fileName: fileInput.files[0].name, fileBase64: reader.result };
            try {
                const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })).json();
                Swal.close();
                if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); loadDocuments(); loadDashboard(); document.querySelectorAll('.nav-item')[2].click(); }
                else Swal.fire('ผิดพลาด', res.message, 'error');
            } catch (err) { Swal.close(); Swal.fire('ผิดพลาด', 'ไม่ได้รับข้อมูลตอบกลับจากเซิร์ฟเวอร์ แต่ข้อมูลอาจบันทึกแล้ว กรุณาเช็คหน้าติดตาม', 'warning'); }
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    async function loadDashboard() {
        try {
            const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDashboardStats', username: currentUser.username }) })).json();
            if (res.success) {
                document.getElementById('stat-total').innerText = res.stats.total;
                document.getElementById('stat-approved').innerText = res.stats.approved;
                document.getElementById('stat-pending').innerText = res.stats.pending;
            }
        } catch (err) {}
    }

    function searchDocs() { loadDocuments(); document.querySelectorAll('.nav-item')[2].click(); switchTab('tracking', document.querySelectorAll('.nav-item')[2]); }

    async function loadDocuments() {
        const container = document.getElementById('documentListContainer');
        container.innerHTML = '<p class="text-center py-4"><i class="fas fa-spinner fa-spin"></i> กำลังโหลดเอกสาร...</p>';
        const payload = {
            action: 'getAllDocuments', username: currentUser.username, role: currentUser.role,
            f_docId: document.getElementById('f_docId').value, f_title: document.getElementById('f_title').value,
            f_type: document.getElementById('f_type').value, f_dept: document.getElementById('f_dept').value,
            f_year: document.getElementById('f_year').value
        };
        const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })).json();
        if(res.success) { allDocsData = res.data; currentPage = 1; renderPage(); }
    }

    function renderPage() {
        const container = document.getElementById('documentListContainer');
        if (allDocsData.length === 0) { container.innerHTML = '<p class="text-center text-gray-400 py-4">ไม่พบเอกสาร</p>'; return; }
        
        let start = (currentPage - 1) * pageSize; let end = start + pageSize;
        let pagedData = allDocsData.slice(start, end);
        let totalPages = Math.ceil(allDocsData.length / pageSize);
        
        document.getElementById('pageInfo').innerText = `หน้า ${currentPage}/${totalPages} (รวม ${allDocsData.length} รายการ)`;
        document.getElementById('btnPrev').disabled = currentPage === 1;
        document.getElementById('btnNext').disabled = currentPage === totalPages;

        let html = ''; let hasApproveItem = false;
        pagedData.forEach(item => {
            let stCol = item.status.includes('อนุมัติเสร็จ') ? 'bg-green-500' : (item.status.includes('ตีกลับ') ? 'bg-red-500' : 'bg-yellow-500');
            let cbHtml = '';
            if(item.isCanApprove) {
                hasApproveItem = true;
                cbHtml = `<input type="checkbox" class="doc-cb mr-2 mt-1 w-4 h-4" value="${item.row}" data-docid="${item.docId}" data-title="${item.title}">`;
            }
            html += `
            <div class="bg-white border p-3 rounded-xl mb-2 flex flex-col">
                <div class="flex justify-between items-start mb-1">
                    <div class="flex items-start">${cbHtml}<div><h4 class="font-bold text-sm text-gray-800">${item.docId}</h4><p class="text-xs text-gray-600">${item.title}</p></div></div>
                    <span class="${stCol} text-white text-[10px] px-2 py-0.5 rounded-full whitespace-nowrap">${item.status}</span>
                </div>
                <div class="flex justify-between items-center mt-2 border-t pt-2">
                    <span class="text-[10px] text-gray-400">แผนก: ${item.dept} | ปี: ${item.year}</span>
                    <a href="${item.url}" target="_blank" class="bg-blue-50 text-blue-600 text-xs px-3 py-1 rounded border border-blue-200"><i class="fas fa-eye mr-1"></i> ดูไฟล์</a>
                </div>
            </div>`;
        });
        document.getElementById('batchDocContainer').style.display = hasApproveItem ? 'flex' : 'none';
        container.innerHTML = html;
    }

    function changePage(dir) { currentPage += dir; renderPage(); }
    function selectAllDocs() { let cbs = document.querySelectorAll('.doc-cb'); let ch = Array.from(cbs).some(c => c.checked); cbs.forEach(c => c.checked = !ch); }

    async function actionBatchDoc(actionType) {
        let cbs = document.querySelectorAll('.doc-cb:checked');
        if(cbs.length === 0) return Swal.fire('เตือน', 'เลือกอย่างน้อย 1 รายการ', 'warning');
        let items = []; cbs.forEach(c => items.push({ row: c.value, docId: c.dataset.docid, title: c.dataset.title }));
        Swal.fire({ title: actionType==='approve' ? `อนุมัติ ${items.length} รายการ?` : `ตีกลับ ${items.length} รายการ?`, input: 'textarea', inputPlaceholder: 'หมายเหตุเพิ่มเติม (ถ้ามี)', icon: 'question', showCancelButton: true, confirmButtonText: 'ยืนยัน', confirmButtonColor: actionType==='approve' ? '#22c55e' : '#ef4444' }).then(async res => {
            if (res.isConfirmed) {
                showLoading('กำลังบันทึก...');
                const r = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'batchApproveDoc', items: items, actionType: actionType, note: res.value||"" }) })).json();
                if(r.success) { Swal.fire('สำเร็จ', r.message, 'success'); loadDocuments(); loadDashboard(); }
            }
        });
    }

    // จัดการผู้ใช้ทั้งหมด (Admin Full Management)
    async function loadAllUsersAdmin() {
        const container = document.getElementById('userListContainer');
        container.innerHTML = '<p class="text-center py-4"><i class="fas fa-spinner fa-spin"></i> โหลดผู้ใช้ทั้งหมด...</p>';
        const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getAllUsers' }) })).json();
        if(res.success && res.data.length > 0) {
            let html = '';
            res.data.forEach(u => {
                let stCol = u.status === 'Active' ? 'text-green-600' : (u.status === 'Pending' ? 'text-orange-500 font-bold' : 'text-red-500');
                html += `
                <div class="bg-white border p-3 rounded-xl mb-3 flex flex-col text-xs">
                    <div class="flex justify-between border-b pb-1 mb-2 font-bold text-sm">
                        <span>${u.username}</span>
                        <span class="${stCol}">${u.status}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <div><label class="text-gray-400">ชื่อ-นามสกุล:</label><input type="text" id="un_${u.row}" value="${u.name}" class="w-full p-1 border rounded"></div>
                        <div><label class="text-gray-400">อีเมล:</label><input type="text" id="ue_${u.row}" value="${u.email}" class="w-full p-1 border rounded"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mb-2">
                        <div><label class="text-gray-400">แผนก:</label><input type="text" id="ud_${u.row}" value="${u.dept}" class="w-full p-1 border rounded"></div>
                        <div><label class="text-gray-400">สิทธิ์ (Role):</label>
                            <select id="ur_${u.row}" class="w-full p-1 border rounded bg-white">
                                <option value="User" ${u.role==='User'?'selected':''}>User</option>
                                <option value="Approver" ${u.role==='Approver'?'selected':''}>Approver</option>
                                <option value="Admin" ${u.role==='Admin'?'selected':''}>Admin</option>
                            </select>
                        </div>
                        <div><label class="text-gray-400">สถานะ:</label>
                            <select id="us_${u.row}" class="w-full p-1 border rounded bg-white">
                                <option value="Active" ${u.status==='Active'?'selected':''}>Active</option>
                                <option value="Pending" ${u.status==='Pending'?'selected':''}>Pending</option>
                                <option value="Rejected" ${u.status==='Rejected'?'selected':''}>Rejected</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="saveUserAdmin(${u.row})" class="bg-purple-600 text-white py-1.5 rounded mt-1 font-semibold hover:bg-purple-700"><i class="fas fa-save mr-1"></i> บันทึกการเปลี่ยนแปลง</button>
                </div>`;
            });
            container.innerHTML = html;
        } else container.innerHTML = '<p class="text-center text-gray-400 py-4">ไม่พบข้อมูลผู้ใช้</p>';
    }

    async function saveUserAdmin(rowNum) {
        showLoading('กำลังอัปเดตข้อมูลผู้ใช้...');
        const payload = {
            action: 'updateUserAdmin', row: rowNum,
            name: document.getElementById(`un_${rowNum}`).value,
            email: document.getElementById(`ue_${rowNum}`).value,
            dept: document.getElementById(`ud_${rowNum}`).value,
            role: document.getElementById(`ur_${rowNum}`).value,
            status: document.getElementById(`us_${rowNum}`).value
        };
        const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })).json();
        if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); loadAllUsersAdmin(); }
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(e => e.style.display = 'none');
        document.getElementById('tab-' + tabId).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
    }
    function logout() { location.reload(); }
</script>
</body>
</html>
