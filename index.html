<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Document Approval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background-color: #ffffff; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .hidden-section { display: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; padding: 10px 0; z-index: 50;}
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.75rem; cursor: pointer; transition: color 0.3s;}
        .nav-item.active { color: #3b82f6; }
        .nav-item i { font-size: 1.25rem; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="loginSection" class="p-8 flex flex-col justify-center min-h-screen bg-blue-50">
        <div class="text-center mb-8">
            <i class="fas fa-file-signature text-6xl text-blue-500 mb-4"></i>
            <h1 class="text-2xl font-semibold text-gray-800">เข้าสู่ระบบ</h1>
            <p class="text-gray-500 text-sm">e-Document Approval</p>
        </div>
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
            <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน" class="w-full mb-4 p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400">
            <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full mb-4 p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400">
            
            <div class="flex items-center mb-6">
                <input type="checkbox" id="remember" class="mr-2">
                <label for="remember" class="text-sm text-gray-600">จดจำรหัสผ่าน</label>
            </div>
            
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-500 text-white p-3 rounded-xl font-medium hover:bg-blue-600 transition shadow-md">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="mainAppSection" class="hidden-section pb-20">
        
        <div class="bg-blue-600 text-white p-5 rounded-b-3xl shadow-md mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-semibold">ยินดีต้อนรับ, <span id="displayUserName"></span></h2>
                    <p class="text-xs text-blue-200" id="displayUserRole"></p>
                </div>
                <button onclick="logout()" class="text-white hover:text-blue-200"><i class="fas fa-sign-out-alt text-xl"></i></button>
            </div>
        </div>

        <div id="tab-request" class="p-4">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">สร้างคำขออนุมัติ</h3>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 mb-1">หมายเลขเอกสาร</label>
                    <input type="text" id="docId" class="w-full p-2 border rounded-lg bg-gray-50">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 mb-1">เรื่อง</label>
                    <input type="text" id="title" class="w-full p-2 border rounded-lg bg-gray-50">
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">ประเภท</label>
                        <select id="docType" class="w-full p-2 border rounded-lg bg-gray-50">
                            <option>WI</option><option>FI</option><option>FO</option><option>QP</option><option>FD</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">สถานะ</label>
                        <select id="docStatus" class="w-full p-2 border rounded-lg bg-gray-50">
                            <option>เอกสารบังคับใช้</option><option>เอกสารทั่วไป</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">ฉบับที่</label>
                        <input type="number" id="revNo" class="w-full p-2 border rounded-lg bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">ระดับความลับ</label>
                        <select id="secretLevel" class="w-full p-2 border rounded-lg bg-gray-50">
                            <option>เอกสารภายใน</option><option>ลับ</option>
                        </select>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">แนบไฟล์ (PDF)</label>
                    <input type="file" id="fileUpload" accept=".pdf" class="w-full p-2 border rounded-lg bg-gray-50 text-sm">
                </div>
                <button onclick="submitRequest()" class="w-full bg-green-500 text-white p-3 rounded-xl font-medium hover:bg-green-600 shadow-md">
                    <i class="fas fa-paper-plane mr-2"></i> ส่งขออนุมัติ
                </button>
            </div>
        </div>

        <div id="tab-tracking" class="hidden-section p-4">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">รายการของฉัน</h3>
            <div class="bg-yellow-50 border border-yellow-200 p-4 rounded-xl mb-3 flex items-center justify-between">
                <div>
                    <h4 class="font-medium text-gray-800">WI-LABO/IM-05</h4>
                    <p class="text-xs text-gray-500">รอทบทวน 1</p>
                </div>
                <span class="bg-yellow-500 text-white text-xs px-2 py-1 rounded-full">Pending</span>
            </div>
        </div>

        <div id="tab-admin" class="hidden-section p-4">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">ทบทวนและอนุมัติ</h3>
            <p class="text-sm text-gray-500">ไม่มีรายการรออนุมัติ</p>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('request', this)">
                <i class="fas fa-file-medical"></i><span>สร้างคำขอ</span>
            </div>
            <div class="nav-item" onclick="switchTab('tracking', this)">
                <i class="fas fa-tasks"></i><span>ติดตาม</span>
            </div>
            <div class="nav-item" onclick="switchTab('admin', this)" id="navAdmin" style="display:none;">
                <i class="fas fa-check-double"></i><span>อนุมัติ</span>
            </div>
        </div>

    </div>
</div>

<script>
    // ** นำ URL ของ Web App จาก Google Apps Script มาใส่ที่นี่ **
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxSOGutKx0qinHxLzWa5cM1V_UI_vhsDwu9_ZLcrE6oceEgc5q9AGv3V1uPD1szoh-P/exec"; 
    
    let currentUser = null;

    // ระบบ Login
    async function handleLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        
        if(!user || !pass) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');
        
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังเข้าสู่ระบบ...';
        
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', username: user, password: pass })
            });
            const result = await response.json();
            
            if (result.success) {
                currentUser = result.user;
                localStorage.setItem('docUser', JSON.stringify(currentUser));
                showMainApp();
            } else {
                localStorage.removeItem('docUser'); // ล้างข้อมูลทันทีหากไม่พบข้อมูลบุคคลในฐานระบบ
                alert('ไม่พบข้อมูลผู้ใช้งาน หรือรหัสผ่านไม่ถูกต้อง');
            }
        } catch (error) {
            alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
        } finally {
            btn.innerHTML = 'เข้าสู่ระบบ';
        }
    }

    // แสดงหน้าจอหลัก
    function showMainApp() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('mainAppSection').style.display = 'block';
        document.getElementById('displayUserName').innerText = currentUser.name;
        document.getElementById('displayUserRole').innerText = currentUser.role;
        
        if(currentUser.role === 'Admin' || currentUser.role === 'Approver') {
            document.getElementById('navAdmin').style.display = 'flex';
        }
    }

    // ออกจากระบบ
    function logout() {
        localStorage.removeItem('docUser');
        currentUser = null;
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginSection').style.display = 'flex';
        document.getElementById('mainAppSection').style.display = 'none';
    }

    // สลับแท็บหน้าจอ
    function switchTab(tabId, element) {
        document.getElementById('tab-request').style.display = 'none';
        document.getElementById('tab-tracking').style.display = 'none';
        document.getElementById('tab-admin').style.display = 'none';
        document.getElementById('tab-' + tabId).style.display = 'block';
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
    }

    // แปลงไฟล์เป็น Base64
    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    // ส่งคำขออนุมัติ
    async function submitRequest() {
        const fileInput = document.getElementById('fileUpload');
        if(fileInput.files.length === 0) return alert('กรุณาแนบไฟล์เอกสาร PDF');
        
        const file = fileInput.files[0];
        const base64 = await getBase64(file);
        
        const payload = {
            action: 'submitDoc',
            owner: currentUser.name,
            dept: currentUser.dept,
            docId: document.getElementById('docId').value,
            title: document.getElementById('title').value,
            docType: document.getElementById('docType').value,
            docStatus: document.getElementById('docStatus').value,
            revNo: document.getElementById('revNo').value,
            secretLevel: document.getElementById('secretLevel').value,
            fileName: file.name,
            fileBase64: base64
        };

        alert('กำลังส่งข้อมูล กรุณารอสักครู่...');
        
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            
            if(result.success) {
                alert(result.message);
                document.getElementById('docId').value = '';
                document.getElementById('title').value = '';
                fileInput.value = '';
                // สลับไปหน้าติดตามสถานะ
                document.querySelectorAll('.nav-item')[1].click(); 
            }
        } catch (error) {
            alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
        }
    }
</script>
</body>
</html>
