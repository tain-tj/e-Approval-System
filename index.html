<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Document Approval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background-color: #ffffff; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .hidden-section { display: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; padding: 10px 0; z-index: 50;}
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.75rem; cursor: pointer; transition: color 0.3s; width: 25%;}
        .nav-item.active { color: #3b82f6; }
        .nav-item i { font-size: 1.25rem; margin-bottom: 2px; }
    </style>
</head>
<body onload="initApp()">

<div class="app-container">
    <div id="authSection" class="p-8 flex flex-col justify-center min-h-screen bg-blue-50">
        <div class="text-center mb-8">
            <i class="fas fa-file-signature text-6xl text-blue-500 mb-4"></i><h1 class="text-2xl font-semibold text-gray-800" id="authTitle">เข้าสู่ระบบ</h1>
        </div>
        <div id="loginForm" class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
            <input type="text" id="log_username" placeholder="Username" class="w-full mb-4 p-3 border rounded-xl">
            <input type="password" id="log_password" placeholder="Password" class="w-full mb-6 p-3 border rounded-xl">
            <button onclick="handleLogin()" class="w-full bg-blue-500 text-white p-3 rounded-xl font-medium">เข้าสู่ระบบ</button>
            <p class="text-center text-sm text-gray-500 mt-4 cursor-pointer" onclick="toggleAuth('register')">ลงทะเบียนใหม่</p>
        </div>
        <div id="registerForm" class="hidden-section bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
            <input type="text" id="reg_username" placeholder="Username" class="w-full mb-3 p-3 border rounded-xl">
            <input type="password" id="reg_password" placeholder="Password" class="w-full mb-3 p-3 border rounded-xl">
            <input type="text" id="reg_name" placeholder="ชื่อ-นามสกุล" class="w-full mb-3 p-3 border rounded-xl">
            <select id="reg_dept" class="w-full mb-3 p-3 border rounded-xl bg-white text-gray-600"><option value="">กำลังโหลดแผนก...</option></select>
            <input type="email" id="reg_email" placeholder="Email" class="w-full mb-4 p-3 border rounded-xl">
            <button onclick="handleRegister()" class="w-full bg-green-500 text-white p-3 rounded-xl font-medium">สมัครใช้งาน</button>
            <p class="text-center text-sm text-gray-500 mt-4 cursor-pointer" onclick="toggleAuth('login')">ย้อนกลับ</p>
        </div>
    </div>

    <div id="mainAppSection" class="hidden-section pb-20">
        <div class="bg-blue-600 text-white p-5 rounded-b-3xl shadow-md mb-6 flex justify-between items-center">
            <div><h2 class="text-lg font-semibold"><span id="displayUserName"></span></h2><p class="text-xs" id="displayUserRole"></p></div>
            <button onclick="logout()"><i class="fas fa-sign-out-alt text-xl"></i></button>
        </div>

        <div id="tab-dashboard" class="p-4 tab-content">
            <h3 class="text-xl font-semibold mb-4">ภาพรวม</h3>
            
            <div id="admin-stats" class="bg-red-50 p-4 rounded-xl text-center border border-red-100 mb-4" style="display:none;">
                <p class="text-sm text-red-600 font-medium">งานที่คุณต้องทบทวน/อนุมัติ</p>
                <h2 class="text-4xl font-bold text-red-800 mt-1" id="stat-pending-review">-</h2>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-blue-50 p-4 rounded-xl text-center"><p class="text-sm text-blue-600 font-medium">ส่งขอทั้งหมด</p><h2 class="text-3xl font-bold" id="stat-total">-</h2></div>
                <div class="bg-green-50 p-4 rounded-xl text-center"><p class="text-sm text-green-600 font-medium">อนุมัติแล้ว</p><h2 class="text-3xl font-bold" id="stat-approved">-</h2></div>
            </div>
            <div class="bg-yellow-50 p-4 rounded-xl text-center border border-yellow-100">
                <p class="text-sm text-yellow-600 font-medium">เอกสารรอหน่วยงานอื่น</p><h2 class="text-3xl font-bold text-yellow-800" id="stat-pending">-</h2>
            </div>
        </div>

        <div id="tab-request" class="hidden-section p-4 tab-content">
            <h3 class="text-xl font-semibold mb-4">สร้างคำขอ</h3>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <input type="text" id="docId" placeholder="หมายเลขเอกสาร" class="w-full mb-3 p-2 border rounded">
                <input type="text" id="title" placeholder="เรื่อง" class="w-full mb-3 p-2 border rounded">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <select id="docType" class="w-full p-2 border rounded"><option>WI</option><option>FI</option></select>
                    <select id="docStatus" class="w-full p-2 border rounded"><option>เอกสารบังคับใช้</option><option>เอกสารทั่วไป</option></select>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="number" id="revNo" placeholder="ฉบับที่" class="w-full p-2 border rounded">
                    <select id="secretLevel" class="w-full p-2 border rounded"><option>เอกสารภายใน</option><option>ลับ</option></select>
                </div>
                <input type="file" id="fileUpload" accept=".pdf" class="w-full mb-4 p-2 border rounded text-sm">
                <button onclick="submitRequest()" class="w-full bg-blue-500 text-white p-3 rounded-xl font-medium">ส่งขออนุมัติ</button>
            </div>
        </div>

        <div id="tab-tracking" class="hidden-section p-4 tab-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold">ติดตามสถานะ</h3><button onclick="loadTracking()" class="text-blue-500 text-sm"><i class="fas fa-sync"></i> รีเฟรช</button>
            </div>
            <div id="trackingListContainer"></div>
        </div>

        <div id="tab-admin" class="hidden-section p-4 tab-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold text-red-600">รายการรออนุมัติ</h3>
                <button onclick="loadApprovals()" class="text-blue-500 text-sm"><i class="fas fa-sync"></i> รีเฟรช</button>
            </div>
            
            <div id="batchActionContainer" class="flex gap-2 mb-4 hidden-section">
                <button onclick="selectAll()" class="bg-gray-200 text-gray-700 px-3 py-1 rounded text-xs">เลือกทั้งหมด</button>
                <button onclick="actionBatchApprove('approve')" class="bg-green-500 text-white px-3 py-1 rounded text-xs flex-1">อนุมัติที่เลือก</button>
                <button onclick="actionBatchApprove('reject')" class="bg-red-500 text-white px-3 py-1 rounded text-xs flex-1">ตีกลับที่เลือก</button>
            </div>

            <div id="approvalListContainer"><p class="text-center text-gray-400 py-4">ไม่มีรายการรออนุมัติ</p></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('dashboard', this)"><i class="fas fa-chart-pie"></i><span>ภาพรวม</span></div>
            <div class="nav-item" onclick="switchTab('request', this)"><i class="fas fa-file-medical"></i><span>สร้าง</span></div>
            <div class="nav-item" onclick="switchTab('tracking', this)"><i class="fas fa-tasks"></i><span>ติดตาม</span></div>
            <div class="nav-item" id="navAdmin" style="display:none;" onclick="switchTab('admin', this)"><i class="fas fa-check-double text-red-500"></i><span class="text-red-500">อนุมัติ</span></div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxSOGutKx0qinHxLzWa5cM1V_UI_vhsDwu9_ZLcrE6oceEgc5q9AGv3V1uPD1szoh-P/exec"; 
    let currentUser = null;
    const showLoading = (msg) => Swal.fire({ title: msg, allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    // (initApp, toggleAuth, handleLogin, handleRegister, submitRequest, loadTracking คงเดิมครับ)
    function initApp() {
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDepartments' }) }).then(res => res.json()).then(res => {
            if(res.success && res.data.length > 0) {
                let options = '<option value="">-- เลือกแผนก --</option>';
                res.data.forEach(dept => { options += `<option value="${dept}">${dept}</option>`; });
                document.getElementById('reg_dept').innerHTML = options;
            }
        });
    }

    function toggleAuth(type) {
        document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
        document.getElementById('authTitle').innerText = type === 'login' ? 'เข้าสู่ระบบ' : 'ลงทะเบียน';
    }

    async function handleLogin() {
        const user = document.getElementById('log_username').value;
        const pass = document.getElementById('log_password').value;
        if(!user || !pass) return Swal.fire('แจ้งเตือน', 'กรุณากรอกให้ครบ', 'warning');
        showLoading('กำลังเข้าระบบ...');
        try {
            const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: user, password: pass }) })).json();
            if (res.success) {
                currentUser = res.user; Swal.close();
                document.getElementById('authSection').style.display = 'none'; document.getElementById('mainAppSection').style.display = 'block';
                document.getElementById('displayUserName').innerText = currentUser.name; document.getElementById('displayUserRole').innerText = currentUser.role;
                if(currentUser.role === 'Admin' || currentUser.role === 'Approver') {
                    document.getElementById('navAdmin').style.display = 'flex';
                    document.getElementById('admin-stats').style.display = 'block'; // โชว์กล่องแดงใน Dashboard
                    loadApprovals(); 
                }
                loadDashboard(); loadTracking();
            } else Swal.fire('ล้มเหลว', res.message, 'error');
        } catch (err) { Swal.fire('Error', 'เชื่อมต่อไม่ได้', 'error'); }
    }

    async function handleRegister() {
        const data = { action: 'register', username: document.getElementById('reg_username').value, password: document.getElementById('reg_password').value, name: document.getElementById('reg_name').value, dept: document.getElementById('reg_dept').value, email: document.getElementById('reg_email').value };
        if(!data.username || !data.password || !data.dept) return Swal.fire('เตือน', 'กรอกข้อมูลให้ครบ', 'warning');
        showLoading('กำลังลงทะเบียน...');
        const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) })).json();
        if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); toggleAuth('login'); } else Swal.fire('ล้มเหลว', res.message, 'error');
    }

    async function submitRequest() {
        const fileInput = document.getElementById('fileUpload');
        if(fileInput.files.length === 0) return Swal.fire('แจ้งเตือน', 'แนบไฟล์ด้วยครับ', 'warning');
        showLoading('กำลังอัปโหลด...');
        const reader = new FileReader();
        reader.onload = async function() {
            const payload = { action: 'submitDoc', username: currentUser.username, name: currentUser.name, dept: currentUser.dept, docId: document.getElementById('docId').value, title: document.getElementById('title').value, docType: document.getElementById('docType').value, docStatus: document.getElementById('docStatus').value, revNo: document.getElementById('revNo').value, secretLevel: document.getElementById('secretLevel').value, fileName: fileInput.files[0].name, fileBase64: reader.result };
            try {
                const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })).json();
                if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); loadTracking(); loadDashboard(); document.querySelectorAll('.nav-item')[2].click(); }
            } catch (err) { Swal.fire('ผิดพลาด', 'บันทึกไม่ได้', 'error'); }
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    // โหลด Dashboard ใหม่ที่รวมตัวเลขหัวหน้า
    async function loadDashboard() {
        try {
            const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDashboard', username: currentUser.username }) })).json();
            if (res.success) {
                document.getElementById('stat-total').innerText = res.stats.total;
                document.getElementById('stat-approved').innerText = res.stats.approved;
                document.getElementById('stat-pending').innerText = res.stats.pending;
                if(currentUser.role !== 'User') document.getElementById('stat-pending-review').innerText = res.stats.pendingReview;
            }
        } catch (err) { console.error(err); }
    }

    async function loadTracking() {
        const container = document.getElementById('trackingListContainer'); container.innerHTML = '<p class="text-center py-4"><i class="fas fa-spinner fa-spin"></i> โหลดข้อมูล...</p>';
        try {
            const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getTracking', username: currentUser.username }) })).json();
            if (res.success && res.data.length > 0) {
                let html = '';
                res.data.forEach(item => {
                    let stCol = item.status.includes('อนุมัติเสร็จ') ? 'bg-green-500' : (item.status.includes('ตีกลับ') ? 'bg-red-500' : 'bg-yellow-500');
                    html += `<div class="bg-white border p-4 rounded-xl mb-3 flex items-center justify-between"><div><h4 class="font-medium text-sm">${item.docId}</h4><p class="text-xs text-gray-500">${item.title}</p></div><span class="${stCol} text-white text-xs px-2 py-1 rounded-full text-center max-w-[120px] leading-tight">${item.status}</span></div>`;
                });
                container.innerHTML = html;
            } else container.innerHTML = '<p class="text-center text-gray-400 py-4">ไม่พบประวัติ</p>';
        } catch (err) { container.innerHTML = '<p class="text-center text-red-400 py-4">โหลดผิดพลาด</p>'; }
    }

    // โหลดหน้ารออนุมัติ (เพิ่ม Checkbox)
    async function loadApprovals() {
        const container = document.getElementById('approvalListContainer');
        container.innerHTML = '<p class="text-center"><i class="fas fa-spinner fa-spin"></i> กำลังโหลด...</p>';
        const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getApprovals', username: currentUser.username }) })).json();
        
        if (res.success && res.data.length > 0) {
            document.getElementById('batchActionContainer').style.display = 'flex'; // โชว์ปุ่ม Batch
            let html = '';
            res.data.forEach(item => {
                html += `
                <div class="bg-white border border-red-100 shadow-sm p-4 rounded-xl mb-3 flex flex-col">
                    <div class="flex items-start mb-2">
                        <input type="checkbox" class="batch-cb mt-1 mr-3 w-5 h-5" value="${item.row}" data-docid="${item.docId}" data-title="${item.title}">
                        <div>
                            <p class="font-bold text-gray-800 leading-tight">${item.docId}</p>
                            <p class="text-sm text-gray-600 mb-1 leading-tight">${item.title}</p>
                            <p class="text-xs text-blue-500">สถานะ: ${item.currentStatus} | จาก: ${item.owner}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-2 pl-8">
                        <a href="${item.url}" target="_blank" class="flex-1 bg-gray-100 text-gray-700 text-center py-2 rounded text-sm"><i class="fas fa-eye"></i> ดูไฟล์</a>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        } else {
            document.getElementById('batchActionContainer').style.display = 'none';
            container.innerHTML = '<p class="text-center text-gray-400 py-4">ไม่มีเอกสารรออนุมัติ</p>';
        }
    }

    function selectAll() {
        let checkboxes = document.querySelectorAll('.batch-cb');
        let isChecked = Array.from(checkboxes).some(cb => cb.checked);
        checkboxes.forEach(cb => cb.checked = !isChecked);
    }

    // ฟังก์ชันอนุมัติทีละหลายรายการ พร้อมใส่ Note
    async function actionBatchApprove(actionType) {
        let checkboxes = document.querySelectorAll('.batch-cb:checked');
        if(checkboxes.length === 0) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกเอกสารอย่างน้อย 1 รายการ', 'warning');
        
        let items = [];
        checkboxes.forEach(cb => items.push({ row: cb.value, docId: cb.dataset.docid, title: cb.dataset.title }));

        let titleTxt = actionType === 'approve' ? `ยืนยันอนุมัติ ${items.length} รายการ?` : `ตีกลับ ${items.length} รายการ?`;
        let confirmCol = actionType === 'approve' ? '#22c55e' : '#ef4444';

        Swal.fire({
            title: titleTxt,
            input: 'textarea',
            inputPlaceholder: 'กรอกหมายเหตุ หรือข้อความเพิ่มเติม (ไม่บังคับ)',
            icon: 'question', showCancelButton: true, confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก', confirmButtonColor: confirmCol
        }).then(async (result) => {
            if (result.isConfirmed) {
                showLoading('กำลังดำเนินการ และส่งอีเมล...');
                let note = result.value || "";
                
                const payload = { action: 'batchApprove', items: items, actionType: actionType, note: note };
                const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })).json();
                
                if (res.success) {
                    Swal.fire('สำเร็จ', res.message, 'success');
                    loadApprovals(); loadDashboard(); // โหลดใหม่
                }
            }
        });
    }

    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById('tab-' + tabId).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
    }
    function logout() { location.reload(); }
</script>
</body>
</html>
