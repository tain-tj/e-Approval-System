<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Document Approval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background-color: #ffffff; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .hidden-section { display: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; padding: 10px 0; z-index: 50;}
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.75rem; cursor: pointer; transition: color 0.3s; width: 25%;}
        .nav-item.active { color: #3b82f6; }
        .nav-item i { font-size: 1.25rem; margin-bottom: 2px; }
    </style>
</head>
<body onload="initApp()">

<div class="app-container">

    <div id="authSection" class="p-8 flex flex-col justify-center min-h-screen bg-blue-50">
        <div class="text-center mb-8">
            <i class="fas fa-file-signature text-6xl text-blue-500 mb-4"></i>
            <h1 class="text-2xl font-semibold text-gray-800" id="authTitle">เข้าสู่ระบบ</h1>
        </div>
        
        <div id="loginForm" class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
            <input type="text" id="log_username" placeholder="Username" class="w-full mb-4 p-3 border rounded-xl">
            <input type="password" id="log_password" placeholder="Password" class="w-full mb-6 p-3 border rounded-xl">
            <button onclick="handleLogin()" class="w-full bg-blue-500 text-white p-3 rounded-xl font-medium">เข้าสู่ระบบ</button>
            <p class="text-center text-sm text-gray-500 mt-4 cursor-pointer" onclick="toggleAuth('register')">ลงทะเบียนใหม่</p>
        </div>

        <div id="registerForm" class="hidden-section bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
            <input type="text" id="reg_username" placeholder="Username" class="w-full mb-3 p-3 border rounded-xl">
            <input type="password" id="reg_password" placeholder="Password" class="w-full mb-3 p-3 border rounded-xl">
            <input type="text" id="reg_name" placeholder="ชื่อ-นามสกุล" class="w-full mb-3 p-3 border rounded-xl">
            <select id="reg_dept" class="w-full mb-3 p-3 border rounded-xl bg-white text-gray-600">
                <option value="">กำลังโหลดแผนก...</option>
            </select>
            <input type="email" id="reg_email" placeholder="Email" class="w-full mb-4 p-3 border rounded-xl">
            <button onclick="handleRegister()" class="w-full bg-green-500 text-white p-3 rounded-xl font-medium">สมัครใช้งาน</button>
            <p class="text-center text-sm text-gray-500 mt-4 cursor-pointer" onclick="toggleAuth('login')">ย้อนกลับ</p>
        </div>
    </div>

    <div id="mainAppSection" class="hidden-section pb-20">
        
        <div class="bg-blue-600 text-white p-5 rounded-b-3xl shadow-md mb-6 flex justify-between items-center">
            <div><h2 class="text-lg font-semibold"><span id="displayUserName"></span></h2><p class="text-xs" id="displayUserRole"></p></div>
            <button onclick="logout()"><i class="fas fa-sign-out-alt text-xl"></i></button>
        </div>

        <div id="tab-dashboard" class="p-4 tab-content">
            <h3 class="text-xl font-semibold mb-4">ภาพรวม</h3>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-blue-50 p-4 rounded-xl text-center"><p class="text-sm">ส่งขอทั้งหมด</p><h2 class="text-3xl font-bold" id="stat-total">-</h2></div>
                <div class="bg-green-50 p-4 rounded-xl text-center"><p class="text-sm">อนุมัติแล้ว</p><h2 class="text-3xl font-bold" id="stat-approved">-</h2></div>
            </div>
            <div class="bg-yellow-50 p-4 rounded-xl text-center border border-yellow-100">
                <p class="text-sm text-yellow-600 font-medium">อยู่ระหว่างดำเนินการ</p>
                <h2 class="text-3xl font-bold text-yellow-800" id="stat-pending">-</h2>
            </div>
        </div>

        <div id="tab-request" class="hidden-section p-4 tab-content">
            <h3 class="text-xl font-semibold mb-4">สร้างคำขอ</h3>
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <input type="text" id="docId" placeholder="หมายเลขเอกสาร" class="w-full mb-3 p-2 border rounded">
                <input type="text" id="title" placeholder="เรื่อง" class="w-full mb-3 p-2 border rounded">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <select id="docType" class="w-full p-2 border rounded"><option>WI</option><option>FI</option></select>
                    <select id="docStatus" class="w-full p-2 border rounded"><option>เอกสารบังคับใช้</option><option>เอกสารทั่วไป</option></select>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="number" id="revNo" placeholder="ฉบับที่" class="w-full p-2 border rounded">
                    <select id="secretLevel" class="w-full p-2 border rounded"><option>เอกสารภายใน</option><option>ลับ</option></select>
                </div>
                <input type="file" id="fileUpload" accept=".pdf" class="w-full mb-4 p-2 border rounded text-sm">
                <button onclick="submitRequest()" class="w-full bg-blue-500 text-white p-3 rounded-xl font-medium">ส่งขออนุมัติ</button>
            </div>
        </div>

        <div id="tab-tracking" class="hidden-section p-4 tab-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold">ติดตามสถานะ</h3>
                <button onclick="loadTracking()" class="text-blue-500 text-sm"><i class="fas fa-sync"></i> รีเฟรช</button>
            </div>
            <div id="trackingListContainer"></div>
        </div>

        <div id="tab-admin" class="hidden-section p-4 tab-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold text-red-600">รายการรออนุมัติ</h3>
                <button onclick="loadApprovals()" class="text-blue-500 text-sm"><i class="fas fa-sync"></i> รีเฟรช</button>
            </div>
            <div id="approvalListContainer">
                <p class="text-center text-gray-400 py-4">ไม่มีรายการรออนุมัติ</p>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('dashboard', this)"><i class="fas fa-chart-pie"></i><span>ภาพรวม</span></div>
            <div class="nav-item" onclick="switchTab('request', this)"><i class="fas fa-file-medical"></i><span>สร้าง</span></div>
            <div class="nav-item" onclick="switchTab('tracking', this)"><i class="fas fa-tasks"></i><span>ติดตาม</span></div>
            <div class="nav-item" id="navAdmin" style="display:none;" onclick="switchTab('admin', this)"><i class="fas fa-check-double text-red-500"></i><span class="text-red-500">อนุมัติ</span></div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxSOGutKx0qinHxLzWa5cM1V_UI_vhsDwu9_ZLcrE6oceEgc5q9AGv3V1uPD1szoh-P/exec"; // ** ใส่ URL ใหม่ที่ Deploy รอบนี้ **
    let currentUser = null;
    const showLoading = (msg) => Swal.fire({ title: msg, allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    function initApp() {
        // โหลดรายชื่อแผนกมาใส่ Dropdown ทันทีที่เปิดเว็บ
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDepartments' }) })
        .then(res => res.json())
        .then(res => {
            if(res.success && res.data.length > 0) {
                let options = '<option value="">-- เลือกแผนก --</option>';
                res.data.forEach(dept => { options += `<option value="${dept}">${dept}</option>`; });
                document.getElementById('reg_dept').innerHTML = options;
            }
        });
    }

    function toggleAuth(type) {
        document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
        document.getElementById('authTitle').innerText = type === 'login' ? 'เข้าสู่ระบบ' : 'ลงทะเบียน';
    }

    async function handleLogin() {
        const user = document.getElementById('log_username').value;
        const pass = document.getElementById('log_password').value;
        if(!user || !pass) return Swal.fire('แจ้งเตือน', 'กรุณากรอกให้ครบ', 'warning');
        
        showLoading('กำลังเข้าระบบ...');
        try {
            const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: user, password: pass }) })).json();
            if (res.success) {
                currentUser = res.user;
                Swal.close();
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainAppSection').style.display = 'block';
                document.getElementById('displayUserName').innerText = currentUser.name;
                document.getElementById('displayUserRole').innerText = currentUser.role;
                
                // ถ้าเป็น Approver หรือ Admin ให้เปิดแท็บอนุมัติ
                if(currentUser.role === 'Admin' || currentUser.role === 'Approver') {
                    document.getElementById('navAdmin').style.display = 'flex';
                    loadApprovals(); // โหลดงานรออนุมัติทันที
                }
                
                loadDashboard();
                loadTracking();
            } else Swal.fire('ล้มเหลว', res.message, 'error');
        } catch (err) { Swal.fire('Error', 'ไม่สามารถเชื่อมต่อได้', 'error'); }
    }

    async function handleRegister() {
        const data = { action: 'register', username: document.getElementById('reg_username').value, 
            password: document.getElementById('reg_password').value, name: document.getElementById('reg_name').value, 
            dept: document.getElementById('reg_dept').value, email: document.getElementById('reg_email').value };
        if(!data.username || !data.password || !data.dept) return Swal.fire('เตือน', 'กรอกข้อมูลสำคัญให้ครบ', 'warning');
        
        showLoading('กำลังลงทะเบียน...');
        const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) })).json();
        if(res.success) { Swal.fire('สำเร็จ', res.message, 'success'); toggleAuth('login'); }
        else Swal.fire('ล้มเหลว', res.message, 'error');
    }

    // --- ส่วนทบทวน/อนุมัติ ---
    async function loadApprovals() {
        const container = document.getElementById('approvalListContainer');
        container.innerHTML = '<p class="text-center"><i class="fas fa-spinner fa-spin"></i> กำลังโหลด...</p>';
        const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getApprovals', username: currentUser.username }) })).json();
        
        if (res.success && res.data.length > 0) {
            let html = '';
            res.data.forEach(item => {
                html += `
                <div class="bg-white border border-red-100 shadow-sm p-4 rounded-xl mb-3">
                    <p class="font-bold text-gray-800">${item.docId}</p>
                    <p class="text-sm text-gray-600 mb-1">${item.title}</p>
                    <p class="text-xs text-blue-500 mb-3">สถานะ: ${item.currentStatus} | จาก: ${item.owner}</p>
                    <div class="flex gap-2">
                        <a href="${item.url}" target="_blank" class="flex-1 bg-gray-100 text-gray-700 text-center py-2 rounded text-sm"><i class="fas fa-eye"></i> ดูไฟล์</a>
                        <button onclick="actionApprove(${item.row}, '${item.title}', 'approve')" class="flex-1 bg-green-500 text-white py-2 rounded text-sm"><i class="fas fa-check"></i> อนุมัติ</button>
                        <button onclick="actionApprove(${item.row}, '${item.title}', 'reject')" class="flex-1 bg-red-500 text-white py-2 rounded text-sm"><i class="fas fa-times"></i> ตีกลับ</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        } else {
            container.innerHTML = '<p class="text-center text-gray-400 py-4">ไม่มีเอกสารรออนุมัติ</p>';
        }
    }

    function actionApprove(rowNum, title, actionType) {
        Swal.fire({
            title: actionType === 'approve' ? 'ยืนยันการอนุมัติ?' : 'ยืนยันการส่งกลับแก้ไข?',
            text: title, icon: 'question', showCancelButton: true,
            confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก', confirmButtonColor: actionType==='approve' ? '#22c55e' : '#ef4444'
        }).then(async (result) => {
            if (result.isConfirmed) {
                showLoading('กำลังดำเนินการ...');
                const res = await (await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'approveDoc', row: rowNum, title: title, actionType: actionType }) })).json();
                if (res.success) {
                    Swal.fire('สำเร็จ', res.message, 'success');
                    loadApprovals(); // โหลดใหม่
                }
            }
        });
    }
    
    async function submitRequest() {
        const fileInput = document.getElementById('fileUpload');
        if(fileInput.files.length === 0) return Swal.fire('แจ้งเตือน', 'กรุณาแนบไฟล์เอกสาร PDF', 'warning');
        
        showLoading('กำลังอัปโหลดเอกสาร...');
        const file = fileInput.files[0];
        const reader = new FileReader();
        
        reader.onload = async function() {
            const payload = {
                action: 'submitDoc', username: currentUser.username, name: currentUser.name, dept: currentUser.dept,
                docId: document.getElementById('docId').value, title: document.getElementById('title').value,
                docType: document.getElementById('docType').value, docStatus: document.getElementById('docStatus').value,
                revNo: document.getElementById('revNo').value, secretLevel: document.getElementById('secretLevel').value,
                fileName: file.name, fileBase64: reader.result
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.success) {
                    Swal.fire('สำเร็จ', result.message, 'success');
                    // เคลียร์ฟอร์ม
                    document.getElementById('docId').value = ''; document.getElementById('title').value = ''; fileInput.value = '';
                    // โหลดข้อมูลใหม่และสลับหน้า
                    loadTracking();
                    loadDashboard();
                    document.querySelectorAll('.nav-item')[2].click(); 
                }
            } catch (err) { Swal.fire('ผิดพลาด', 'บันทึกไม่สำเร็จ', 'error'); }
        };
        reader.readAsDataURL(file);
    }

    // 4. โหลดข้อมูล Tracking
    async function loadTracking() {
        const container = document.getElementById('trackingListContainer');
        container.innerHTML = '<p class="text-center text-gray-500 text-sm py-4"><i class="fas fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...</p>';
        
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getTracking', username: currentUser.username }) });
            const result = await res.json();
            
            if (result.success && result.data.length > 0) {
                let html = '';
                result.data.forEach(item => {
                    let statusColor = item.status.includes('อนุมัติ') ? 'bg-green-500' : 'bg-yellow-500';
                    html += `
                    <div class="bg-white border border-gray-100 shadow-sm p-4 rounded-xl mb-3 flex items-center justify-between">
                        <div>
                            <h4 class="font-medium text-gray-800 text-sm">${item.docId}</h4>
                            <p class="text-xs text-gray-500 truncate w-40">${item.title}</p>
                            <p class="text-xs text-blue-400 mt-1"><i class="far fa-calendar-alt"></i> ${item.date}</p>
                        </div>
                        <span class="${statusColor} text-white text-xs px-2 py-1 rounded-full">${item.status}</span>
                    </div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<p class="text-center text-gray-400 text-sm py-4">ไม่พบประวัติการขออนุมัติ</p>';
            }
        } catch (err) { container.innerHTML = '<p class="text-center text-red-400 text-sm py-4">โหลดข้อมูลผิดพลาด</p>'; }
    }

    // 5. โหลดข้อมูล Dashboard
    async function loadDashboard() {
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDashboard', username: currentUser.username }) });
            const result = await res.json();
            if (result.success) {
                document.getElementById('stat-total').innerText = result.stats.total;
                document.getElementById('stat-approved').innerText = result.stats.approved;
                document.getElementById('stat-pending').innerText = result.stats.pending;
            }
        } catch (err) { console.error('Dashboard Load Error', err); }
    }

    // ฟังก์ชันจัดการ UI ทั่วไป
    function showMainApp() {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('mainAppSection').style.display = 'block';
        document.getElementById('displayUserName').innerText = currentUser.name;
        document.getElementById('displayUserRole').innerText = currentUser.role;
    }

    function logout() {
        Swal.fire({
            title: 'ออกจากระบบ?', icon: 'question', showCancelButton: true, confirmButtonText: 'ใช่, ออกจากระบบ', cancelButtonText: 'ยกเลิก'
        }).then((result) => {
            if (result.isConfirmed) {
                currentUser = null;
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('mainAppSection').style.display = 'none';
                document.getElementById('log_password').value = '';
            }
        });
    }

    function switchTab(tabId, element) {
        // ซ่อนทุกหน้าที่มีคลาส tab-content
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        // แสดงเฉพาะหน้าที่ถูกคลิก
        document.getElementById('tab-' + tabId).style.display = 'block';
        
        // จัดการสีของปุ่มเมนูด้านล่าง
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
    }
</script>
</body>
</html>
