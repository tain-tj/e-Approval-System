<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Document Approval</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background-color: #ffffff; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .hidden-section { display: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; padding: 10px 0; z-index: 50;}
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.75rem; cursor: pointer; transition: color 0.3s;}
        .nav-item.active { color: #3b82f6; }
        .nav-item i { font-size: 1.25rem; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="authSection" class="p-8 flex flex-col justify-center min-h-screen bg-blue-50">
        <div class="text-center mb-8">
            <i class="fas fa-file-signature text-6xl text-blue-500 mb-4"></i>
            <h1 class="text-2xl font-semibold text-gray-800" id="authTitle">เข้าสู่ระบบ</h1>
            <p class="text-gray-500 text-sm">e-Document Approval</p>
        </div>
        
        <div id="loginForm" class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
            <input type="text" id="log_username" placeholder="ชื่อผู้ใช้งาน" class="w-full mb-4 p-3 border rounded-xl focus:ring-2 focus:ring-blue-400">
            <input type="password" id="log_password" placeholder="รหัสผ่าน" class="w-full mb-6 p-3 border rounded-xl focus:ring-2 focus:ring-blue-400">
            <button onclick="handleLogin()" class="w-full bg-blue-500 text-white p-3 rounded-xl font-medium hover:bg-blue-600 shadow-md">เข้าสู่ระบบ</button>
            <p class="text-center text-sm text-gray-500 mt-4 cursor-pointer hover:text-blue-500" onclick="toggleAuth('register')">ยังไม่มีบัญชี? ลงทะเบียนใหม่</p>
        </div>

        <div id="registerForm" class="hidden-section bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
            <input type="text" id="reg_username" placeholder="Username สำหรับเข้าระบบ" class="w-full mb-3 p-3 border rounded-xl">
            <input type="password" id="reg_password" placeholder="รหัสผ่าน" class="w-full mb-3 p-3 border rounded-xl">
            <input type="text" id="reg_name" placeholder="ชื่อ-นามสกุล" class="w-full mb-3 p-3 border rounded-xl">
            <input type="text" id="reg_dept" placeholder="แผนก (พิมพ์ให้ตรงกับฐานข้อมูล)" class="w-full mb-3 p-3 border rounded-xl">
            <input type="email" id="reg_email" placeholder="อีเมลสำหรับรับการแจ้งเตือน" class="w-full mb-4 p-3 border rounded-xl">
            <button onclick="handleRegister()" class="w-full bg-green-500 text-white p-3 rounded-xl font-medium hover:bg-green-600 shadow-md">สมัครใช้งาน</button>
            <p class="text-center text-sm text-gray-500 mt-4 cursor-pointer hover:text-blue-500" onclick="toggleAuth('login')">มีบัญชีแล้ว? เข้าสู่ระบบ</p>
        </div>
    </div>

    <div id="mainAppSection" class="hidden-section pb-20">
        
        <div class="bg-blue-600 text-white p-5 rounded-b-3xl shadow-md mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-semibold">ยินดีต้อนรับ, <span id="displayUserName"></span></h2>
                    <p class="text-xs text-blue-200" id="displayUserRole"></p>
                </div>
                <button onclick="logout()" class="text-white hover:text-blue-200"><i class="fas fa-sign-out-alt text-xl"></i></button>
            </div>
        </div>

        <div id="tab-dashboard" class="p-4">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">ภาพรวมเอกสารของฉัน</h3>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-center">
                    <p class="text-sm text-blue-600 font-medium">ส่งขอทั้งหมด</p>
                    <h2 class="text-3xl font-bold text-blue-800" id="stat-total">-</h2>
                </div>
                <div class="bg-green-50 p-4 rounded-2xl border border-green-100 text-center">
                    <p class="text-sm text-green-600 font-medium">อนุมัติแล้ว</p>
                    <h2 class="text-3xl font-bold text-green-800" id="stat-approved">-</h2>
                </div>
            </div>
            <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-100 text-center">
                <p class="text-sm text-yellow-600 font-medium">อยู่ระหว่างดำเนินการ (Pending)</p>
                <h2 class="text-3xl font-bold text-yellow-800" id="stat-pending">-</h2>
            </div>
        </div>

        <div id="tab-request" class="hidden-section p-4">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">สร้างคำขออนุมัติ</h3>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <div class="mb-3"><label class="block text-sm text-gray-600 mb-1">หมายเลขเอกสาร</label><input type="text" id="docId" class="w-full p-2 border rounded-lg bg-gray-50"></div>
                <div class="mb-3"><label class="block text-sm text-gray-600 mb-1">เรื่อง</label><input type="text" id="title" class="w-full p-2 border rounded-lg bg-gray-50"></div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="block text-sm text-gray-600 mb-1">ประเภท</label><select id="docType" class="w-full p-2 border rounded-lg bg-gray-50"><option>WI</option><option>FI</option></select></div>
                    <div><label class="block text-sm text-gray-600 mb-1">สถานะ</label><select id="docStatus" class="w-full p-2 border rounded-lg bg-gray-50"><option>เอกสารบังคับใช้</option><option>เอกสารทั่วไป</option></select></div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="block text-sm text-gray-600 mb-1">ฉบับที่</label><input type="number" id="revNo" class="w-full p-2 border rounded-lg bg-gray-50"></div>
                    <div><label class="block text-sm text-gray-600 mb-1">ระดับความลับ</label><select id="secretLevel" class="w-full p-2 border rounded-lg bg-gray-50"><option>เอกสารภายใน</option><option>ลับ</option></select></div>
                </div>
                <div class="mb-4"><label class="block text-sm text-gray-600 mb-1">แนบไฟล์ (PDF)</label><input type="file" id="fileUpload" accept=".pdf" class="w-full p-2 border rounded-lg bg-gray-50 text-sm"></div>
                <button onclick="submitRequest()" class="w-full bg-green-500 text-white p-3 rounded-xl font-medium hover:bg-green-600 shadow-md"><i class="fas fa-paper-plane mr-2"></i> ส่งขออนุมัติ</button>
            </div>
        </div>

        <div id="tab-tracking" class="hidden-section p-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold text-gray-800">รายการของฉัน</h3>
                <button onclick="loadTracking()" class="text-blue-500 text-sm"><i class="fas fa-sync-alt"></i> รีเฟรช</button>
            </div>
            <div id="trackingListContainer">
                <p class="text-center text-gray-400 text-sm py-4">ไม่มีข้อมูลรายการขออนุมัติ</p>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('dashboard', this)">
                <i class="fas fa-chart-pie"></i><span>ภาพรวม</span>
            </div>
            <div class="nav-item" onclick="switchTab('request', this)">
                <i class="fas fa-file-medical"></i><span>สร้างคำขอ</span>
            </div>
            <div class="nav-item" onclick="switchTab('tracking', this)">
                <i class="fas fa-tasks"></i><span>ติดตาม</span>
            </div>
        </div>
    </div>
</div>

<script>
    // ** เปลี่ยนเป็น Web App URL ของคุณ **
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxSOGutKx0qinHxLzWa5cM1V_UI_vhsDwu9_ZLcrE6oceEgc5q9AGv3V1uPD1szoh-P/exec"; 
    let currentUser = null;

    // Loading Helper (SweetAlert2)
    const showLoading = (msg) => {
        Swal.fire({ title: msg, allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
    }

    // สลับหน้า Login / Register
    function toggleAuth(type) {
        if (type === 'register') {
            document.getElementById('loginForm').classList.add('hidden-section');
            document.getElementById('registerForm').classList.remove('hidden-section');
            document.getElementById('authTitle').innerText = 'ลงทะเบียนใหม่';
        } else {
            document.getElementById('registerForm').classList.add('hidden-section');
            document.getElementById('loginForm').classList.remove('hidden-section');
            document.getElementById('authTitle').innerText = 'เข้าสู่ระบบ';
        }
    }

    // 1. ระบบ Login
    async function handleLogin() {
        const user = document.getElementById('log_username').value;
        const pass = document.getElementById('log_password').value;
        if(!user || !pass) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบถ้วน', 'warning');
        
        showLoading('กำลังเข้าสู่ระบบ...');
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: user, password: pass }) });
            const result = await res.json();
            
            if (result.success) {
                currentUser = result.user;
                Swal.fire({ icon: 'success', title: 'เข้าสู่ระบบสำเร็จ', timer: 1500, showConfirmButton: false });
                showMainApp();
                loadDashboard(); // ดึงสถิติ
                loadTracking(); // ดึงรายการติดตาม
            } else {
                Swal.fire('เกิดข้อผิดพลาด', result.message, 'error');
            }
        } catch (err) { Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error'); }
    }

    // 2. ระบบลงทะเบียน
    async function handleRegister() {
        const data = {
            action: 'register',
            username: document.getElementById('reg_username').value,
            password: document.getElementById('reg_password').value,
            name: document.getElementById('reg_name').value,
            dept: document.getElementById('reg_dept').value,
            email: document.getElementById('reg_email').value
        };
        
        if(!data.username || !data.password || !data.name) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลสำคัญให้ครบ', 'warning');
        
        showLoading('กำลังส่งข้อมูลลงทะเบียน...');
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
            const result = await res.json();
            
            if (result.success) {
                Swal.fire('สำเร็จ', result.message, 'success').then(() => { toggleAuth('login'); });
            } else {
                Swal.fire('เกิดข้อผิดพลาด', result.message, 'error');
            }
        } catch (err) { Swal.fire('เกิดข้อผิดพลาด', 'เชื่อมต่อขัดข้อง', 'error'); }
    }

    // 3. ส่งเอกสาร
    async function submitRequest() {
        const fileInput = document.getElementById('fileUpload');
        if(fileInput.files.length === 0) return Swal.fire('แจ้งเตือน', 'กรุณาแนบไฟล์เอกสาร PDF', 'warning');
        
        showLoading('กำลังอัปโหลดเอกสาร...');
        const file = fileInput.files[0];
        const reader = new FileReader();
        
        reader.onload = async function() {
            const payload = {
                action: 'submitDoc', username: currentUser.username, name: currentUser.name, dept: currentUser.dept,
                docId: document.getElementById('docId').value, title: document.getElementById('title').value,
                docType: document.getElementById('docType').value, docStatus: document.getElementById('docStatus').value,
                revNo: document.getElementById('revNo').value, secretLevel: document.getElementById('secretLevel').value,
                fileName: file.name, fileBase64: reader.result
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.success) {
                    Swal.fire('สำเร็จ', result.message, 'success');
                    // เคลียร์ฟอร์ม
                    document.getElementById('docId').value = ''; document.getElementById('title').value = ''; fileInput.value = '';
                    // โหลดข้อมูลใหม่และสลับหน้า
                    loadTracking();
                    loadDashboard();
                    document.querySelectorAll('.nav-item')[2].click(); 
                }
            } catch (err) { Swal.fire('ผิดพลาด', 'บันทึกไม่สำเร็จ', 'error'); }
        };
        reader.readAsDataURL(file);
    }

    // 4. โหลดข้อมูล Tracking
    async function loadTracking() {
        const container = document.getElementById('trackingListContainer');
        container.innerHTML = '<p class="text-center text-gray-500 text-sm py-4"><i class="fas fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...</p>';
        
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getTracking', username: currentUser.username }) });
            const result = await res.json();
            
            if (result.success && result.data.length > 0) {
                let html = '';
                result.data.forEach(item => {
                    let statusColor = item.status.includes('อนุมัติ') ? 'bg-green-500' : 'bg-yellow-500';
                    html += `
                    <div class="bg-white border border-gray-100 shadow-sm p-4 rounded-xl mb-3 flex items-center justify-between">
                        <div>
                            <h4 class="font-medium text-gray-800 text-sm">${item.docId}</h4>
                            <p class="text-xs text-gray-500 truncate w-40">${item.title}</p>
                            <p class="text-xs text-blue-400 mt-1"><i class="far fa-calendar-alt"></i> ${item.date}</p>
                        </div>
                        <span class="${statusColor} text-white text-xs px-2 py-1 rounded-full">${item.status}</span>
                    </div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<p class="text-center text-gray-400 text-sm py-4">ไม่พบประวัติการขออนุมัติ</p>';
            }
        } catch (err) { container.innerHTML = '<p class="text-center text-red-400 text-sm py-4">โหลดข้อมูลผิดพลาด</p>'; }
    }

    // 5. โหลดข้อมูล Dashboard
    async function loadDashboard() {
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDashboard', username: currentUser.username }) });
            const result = await res.json();
            if (result.success) {
                document.getElementById('stat-total').innerText = result.stats.total;
                document.getElementById('stat-approved').innerText = result.stats.approved;
                document.getElementById('stat-pending').innerText = result.stats.pending;
            }
        } catch (err) { console.error('Dashboard Load Error', err); }
    }

    // ฟังก์ชันจัดการ UI ทั่วไป
    function showMainApp() {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('mainAppSection').style.display = 'block';
        document.getElementById('displayUserName').innerText = currentUser.name;
        document.getElementById('displayUserRole').innerText = currentUser.role;
    }

    function logout() {
        Swal.fire({
            title: 'ออกจากระบบ?', icon: 'question', showCancelButton: true, confirmButtonText: 'ใช่, ออกจากระบบ', cancelButtonText: 'ยกเลิก'
        }).then((result) => {
            if (result.isConfirmed) {
                currentUser = null;
                document.getElementById('authSection').style.display = 'flex';
                document.getElementById('mainAppSection').style.display = 'none';
                document.getElementById('log_password').value = '';
            }
        });
    }

    function switchTab(tabId, element) {
        document.getElementById('tab-dashboard').style.display = 'none';
        document.getElementById('tab-request').style.display = 'none';
        document.getElementById('tab-tracking').style.display = 'none';
        document.getElementById('tab-' + tabId).style.display = 'block';
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
    }
</script>
</body>
</html>
